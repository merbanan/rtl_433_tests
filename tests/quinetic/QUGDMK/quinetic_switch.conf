# Quinetic Switch
#
# "Kinetic-Powered Switch" (433 MHz) sold by Quinetic UK.
#
# Intro:
# 	Quinetic Switches are typically paired with a Quinetic receiver: e.g. Smart Plug, Lighting Relay.
# 	The switch is battery-free and operates under kinetic power.
#
# 	Quinetic switches are available in a number of form-factors:
#	Large-Single, Large-Double, Large-Triple, Small-Single-Grid
#
#
# Signal Information:
# 	Freqency: 422.92Mhz, with 2048k Sample Rate
# 	Modulation: FSK PCM NRZ
#	10us bit-width
#
#
# CLI Reference:
#
#	Generate capture file (Gain @ 20 for use with R820T SDR Antenna, Autolevel to remove other noise)
#	rtl_433 -s 2048000 -R 0 -Y autolevel -Y squelch -g 20 -S unknown
#
# 	Live shell ((Gain @ 20 for use with R820T SDR Antenna)
# 	rtl_433 -s 2048000 -R 0 -Y minmax -g 20 -X "name=Quinetic,m=FSK_PCM,s=10,l=10,r=120,preamble=5554"
#
#	Live shell with config file
#	rtl_433 -s 2048000 -R 0 -Y minmax -g 20 -c ~/.config/rtl_433/quinetic_switch.conf
#
#
# Sample Data:
#
# 	Button X
# 21 a4 23 1b 87 01 30 b0 4d 68 (PUSH)
# 21 a4 23 1b 87 c0 7c ee a6 b4 80 (RELEASE)
#
# 	Button Y
# 21 a4 23 b6 90 00 aa cc a6 b4 8 (PUSH)
# 21 a4 23 b6 90 c0 9c f4 4d 69 0 (RELEASE)
#
#

decoder {
    name=Quinetic,
    modulation=FSK_PCM,
    short=10,
    long=10,
    reset=120,
    tolerance=2,
    match={16}0x21a4,
    preamble=5554,
}
