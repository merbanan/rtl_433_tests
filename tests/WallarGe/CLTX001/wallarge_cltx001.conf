# temperature_C_x10: 123 = 12.3°C, does not work for temperatures < 0°C
decoder {
  name       = WallarGe-CLTX001-Flex,
  modulation = OOK_PWM,
  short      = 250,
  long       = 500,
  gap        = 650,
  reset      = 1250,
  tolerance  = 75,
  bits       = 56, repeats >= 2, unique, invert,
  get        = @0:{16}:id,
  get        = @24:{1}:low_battery,
  get        = @25:{1}:test_mode,
  get        = @26:{2}:channel:[0:A 1:B 2:C 3:D],
  get        = @28:{12}:temperature_C_x10
}
